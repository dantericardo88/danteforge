name: ✨ Feature Request
description: Suggest a new feature or enhancement for DanteForge
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm you've completed these steps.
      options:
        - label: I have searched existing issues and discussions to ensure this isn't a duplicate
          required: true
        - label: I have reviewed the [roadmap](https://github.com/danteforge/danteforge/issues?q=is%3Aissue+label%3Aroadmap) to see if this is already planned
          required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What workflow is currently painful?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How would you like DanteForge to solve this problem?
      placeholder: |
        Add a new command: `danteforge analyze` that...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions or workarounds have you considered?
      placeholder: "I could use X, but it doesn't..."
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Provide code examples, mockups, or references to similar features in other tools.
      placeholder: |
        # Example usage:
        $ danteforge analyze --security
        🔍 Scanning for vulnerabilities...
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How would this feature benefit users?
      options:
        - Would save significant time daily
        - Would enable new workflows
        - Nice-to-have quality-of-life improvement
        - Low priority
    validations:
      required: true

  - type: dropdown
    id: willing-to-contribute
    attributes:
      label: Contribution
      description: Would you be willing to contribute a PR for this feature?
      options:
        - "Yes, I can implement this"
        - "Maybe, with guidance"
        - "No, but I can help test"
        - "No, just suggesting"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references.
    validations:
      required: false
