name: CI
on:
  push:
  pull_request:

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-repo-hygiene.mjs --strict-presence

  cli:
    needs: repo-hygiene
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
      - run: npm run verify
      - name: Performance regression check
        run: node dist/index.js performance --check
      - run: npm run build

  design-integration:
    needs: repo-hygiene
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npx tsx --test tests/op-codec.test.ts tests/tool-registry.test.ts tests/design-command.test.ts tests/design-gate.test.ts tests/design-agent.test.ts tests/spatial-decomposer.test.ts tests/token-extractor.test.ts tests/headless-renderer.test.ts
        name: Design integration tests

  vscode-extension:
    needs: repo-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
        working-directory: vscode-extension
      - run: npm run verify
        working-directory: vscode-extension

  release-readiness:
    needs: repo-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm run release:check:simulated-fresh
