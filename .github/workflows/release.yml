name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-proof:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install root dependencies
        run: npm ci

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: vscode-extension

      - run: npm run release:proof

      - uses: actions/upload-artifact@v4
        with:
          name: danteforge-release-proof
          path: |
            .danteforge/evidence/release/latest.json
            .danteforge/evidence/release/latest.md

      - uses: actions/upload-artifact@v4
        with:
          name: danteforge-vscode-vsix
          path: vscode-extension/.artifacts/danteforge.vsix

  live-proof:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
      OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
      ANTIGRAVITY_BUNDLES_URL: ${{ vars.ANTIGRAVITY_BUNDLES_URL }}
      FIGMA_MCP_URL: ${{ vars.FIGMA_MCP_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve live provider matrix
        shell: bash
        run: |
          if [ -n "${{ vars.DANTEFORGE_LIVE_PROVIDERS }}" ]; then
            echo "DANTEFORGE_LIVE_PROVIDERS=${{ vars.DANTEFORGE_LIVE_PROVIDERS }}" >> "$GITHUB_ENV"
          else
            echo "DANTEFORGE_LIVE_PROVIDERS=openai,claude" >> "$GITHUB_ENV"
          fi

      - run: npm ci
      - run: npm run build
      - run: npm run check:cli-smoke
      - run: npm run verify:live

      - uses: actions/upload-artifact@v4
        with:
          name: danteforge-live-proof
          path: |
            .danteforge/evidence/live/latest.json
            .danteforge/evidence/live/latest.md

  publish:
    needs: [release-proof, live-proof]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install root dependencies
        run: npm ci

      - name: Install VS Code extension dependencies
        run: npm ci
        working-directory: vscode-extension

      - uses: actions/download-artifact@v4
        with:
          name: danteforge-vscode-vsix
          path: vscode-extension/.artifacts

      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm --prefix vscode-extension run publish:vsce
        if: ${{ secrets.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - run: npm --prefix vscode-extension run publish:ovsx
        if: ${{ secrets.OVSX_PAT != '' }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
